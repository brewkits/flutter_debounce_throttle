# Workspace configuration for flutter_debounce_throttle monorepo
#
# This is not a publishable package. Use the packages in packages/ instead:
# - dart_debounce_throttle: Pure Dart (no Flutter dependencies)
# - flutter_debounce_throttle: Flutter widgets + mixin
# - flutter_debounce_throttle_hooks: Flutter Hooks integration
#
# For development, use Melos:
#   dart pub global activate melos
#   melos bootstrap
#   melos test

name: flutter_debounce_throttle_workspace
publish_to: none

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_debounce_throttle:
    path: packages/flutter_debounce_throttle
  dart_debounce_throttle:
    path: packages/dart_debounce_throttle

  meta: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  melos: ^7.3.0

melos:
  name: flutter_debounce_throttle_workspace
  repository: https://github.com/brewkits/flutter_debounce_throttle
  packages:
    - packages/*

  scripts:
    # Run all tests
    test:
      run: melos exec -- flutter test
      description: Run tests in all packages

    # Run tests for core only (Pure Dart)
    test:core:
      run: melos exec --scope="dart_debounce_throttle" -- dart test
      description: Run tests for core package only

    # Run analysis
    analyze:
      run: melos exec -- flutter analyze
      description: Run flutter analyze in all packages

    # Format code
    format:
      run: melos exec -- dart format .
      description: Format code in all packages

    # Clean all packages
    clean:
      run: melos exec -- flutter clean
      description: Clean all packages

    # Get dependencies for all packages
    get:
      run: melos exec -- flutter pub get
      description: Get dependencies for all packages

    # Publish dry-run (check if ready to publish)
    publish:dry:
      run: melos exec -- flutter pub publish --dry-run
      description: Dry run publish for all packages

    # Publish all packages
    publish:
      run: melos exec --no-private -- flutter pub publish --force
      description: Publish all packages to pub.dev


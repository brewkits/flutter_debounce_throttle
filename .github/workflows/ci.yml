name: CI

on:
  push:
    branches: [ "main", "fix/*", "feat/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Pure Dart package - dart_debounce_throttle
  core:
    name: Core Package (Pure Dart)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dart_debounce_throttle

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

  # Flutter package - flutter_debounce_throttle
  flutter:
    name: Flutter Package
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: packages/flutter_debounce_throttle

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Setup path dependencies
        run: |
          cat > pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
          EOF
          if [ -d "example" ]; then
            cat > example/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../../dart_debounce_throttle
            flutter_debounce_throttle:
              path: ../
          EOF
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  # Flutter Hooks package - flutter_debounce_throttle_hooks
  hooks:
    name: Hooks Package
    runs-on: ubuntu-latest
    needs: flutter
    defaults:
      run:
        working-directory: packages/flutter_debounce_throttle_hooks

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Setup path dependencies
        run: |
          cat > pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
            flutter_debounce_throttle:
              path: ../flutter_debounce_throttle
          EOF
          if [ -d "example" ]; then
            cat > example/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../../dart_debounce_throttle
            flutter_debounce_throttle:
              path: ../../flutter_debounce_throttle
            flutter_debounce_throttle_hooks:
              path: ../
          EOF
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  # Riverpod package - flutter_debounce_throttle_riverpod
  riverpod:
    name: Riverpod Package
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: packages/flutter_debounce_throttle_riverpod

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Setup path dependencies
        run: |
          cat > pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
          EOF
          if [ -d "example" ]; then
            cat > example/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../../dart_debounce_throttle
            flutter_debounce_throttle_riverpod:
              path: ../
          EOF
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

  # Monorepo bootstrap verification
  main-tests:
    name: Main Package Tests
    runs-on: ubuntu-latest
    needs: [core, flutter, hooks, riverpod]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Setup path dependencies for all packages
        run: |
          # Package-level overrides
          cat > packages/flutter_debounce_throttle/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
          EOF

          cat > packages/flutter_debounce_throttle_hooks/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
            flutter_debounce_throttle:
              path: ../flutter_debounce_throttle
          EOF

          cat > packages/flutter_debounce_throttle_riverpod/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
          EOF

          cat > packages/flutter_debounce_throttle_core/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../dart_debounce_throttle
          EOF

          # Example-level overrides (flutter pub get also resolves example/)
          cat > packages/flutter_debounce_throttle/example/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../../dart_debounce_throttle
            flutter_debounce_throttle:
              path: ../
          EOF

          cat > packages/flutter_debounce_throttle_hooks/example/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../../dart_debounce_throttle
            flutter_debounce_throttle:
              path: ../../flutter_debounce_throttle
            flutter_debounce_throttle_hooks:
              path: ../
          EOF

          cat > packages/flutter_debounce_throttle_riverpod/example/pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            dart_debounce_throttle:
              path: ../../dart_debounce_throttle
            flutter_debounce_throttle_riverpod:
              path: ../
          EOF

      - name: Bootstrap monorepo
        run: melos bootstrap
